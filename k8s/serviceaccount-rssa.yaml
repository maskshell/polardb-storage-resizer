# =============================================================================
# PolarDB Storage Resizer - ServiceAccount with RRSA Configuration
# =============================================================================
# This file demonstrates how to configure RRSA (RAM Roles for Service Accounts)
# for Alibaba Cloud ACK (Container Service for Kubernetes) clusters.
#
# RRSA Overview:
# - Allows pods to obtain temporary credentials via OIDC federation
# - No need to store static AccessKey/SecretKey in the cluster
# - Automatic credential rotation and fine-grained permissions
#
# Reference: https://help.aliyun.com/zh/ack/serverless-kubernetes/user-guide/use-rrsa-to-authorize-pods-to-access-different-cloud-services
#
# Prerequisites:
# 1. ACK cluster with RRSA enabled (cluster version >= 1.22)
# 2. OIDC provider configured in your Alibaba Cloud account
# 3. RAM Role with appropriate trust policy for OIDC federation
# 4. RAM Policy granting PolarDB permissions
#
# Setup Steps:
# 1. Create RAM Role with OIDC trust policy (see below)
# 2. Attach PolarDB permissions policy to the RAM Role
# 3. Create ServiceAccount with proper annotations
# 4. Deploy the ServiceAccount before the CronJob
# =============================================================================

# -----------------------------------------------------------------------------
# Step 1: ServiceAccount with RRSA Annotations
# -----------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: polardb-resizer-sa
  namespace: default # Change to your target namespace
  labels:
    app.kubernetes.io/name: polardb-storage-resizer
    app.kubernetes.io/component: serviceaccount
  annotations:
    # RRSA Role Name annotation
    # Just the role name, NOT the full ARN
    # Example: PolardbStorageResizerRole (not acs:ram::xxx:role/PolardbStorageResizerRole)
    pod-identity.alibabacloud.com/role-name: "PolardbStorageResizerRole"

# =============================================================================
# RAM ROLE CONFIGURATION (Create in Alibaba Cloud Console or via Terraform)
# =============================================================================
# The following is NOT a Kubernetes resource - it documents the required
# RAM Role configuration that must be created in Alibaba Cloud.
#
# -----------------------------------------------------------------------------
# RAM Role Trust Policy (for OIDC Federation)
# -----------------------------------------------------------------------------
# This trust policy allows the ACK cluster's OIDC provider to assume this role.
#
# JSON Trust Policy:
# {
#   "Statement": [
#     {
#       "Action": "sts:AssumeRole",
#       "Condition": {
#         "StringEquals": {
#           "oidc:aud": "sts.amazonaws.com",
#           "oidc:sub": "system:serviceaccount:<namespace>:polardb-resizer-sa"
#         }
#       },
#       "Effect": "Allow",
#       "Principal": {
#         "Federated": [
#           "acs:ram::<account-id>:oidc-provider/ack-rrsa-cls-<cluster-id>"
#         ]
#       }
#     }
#   ],
#   "Version": "1"
# }
#
# -----------------------------------------------------------------------------
# RAM Permission Policy (Attach to the Role)
# -----------------------------------------------------------------------------
# {
#   "Version": "1",
#   "Statement": [
#     {
#       "Effect": "Allow",
#       "Action": [
#         "polardb:DescribeDBClusters",
#         "polardb:DescribeDBClusterAttribute",
#         "polardb:ModifyDBClusterStorageSpace"
#       ],
#       "Resource": ["*"]
#     }
#   ]
# }
# =============================================================================
