name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write
  pages: write

jobs:
  # ---------------------------------------------------------------------------
  # Build and push multi-arch container image to GHCR
  # ---------------------------------------------------------------------------
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Package Helm chart, upload to the v-tag release, update gh-pages index
  # ---------------------------------------------------------------------------
  chart:
    runs-on: ubuntu-latest
    needs: image
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Package chart
        run: helm package ./charts/polardb-storage-resizer

      - name: Create release and upload chart
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            polardb-storage-resizer-*.tgz \
            --title "${{ github.ref_name }}" \
            --notes "See [CHANGELOG](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details."

      - name: Update Helm repo index
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

          # Switch to gh-pages, merge the packaged chart into index
          git fetch origin gh-pages
          git checkout gh-pages

          helm repo index . --url https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}

          git add index.yaml
          git diff --cached --quiet || git commit -m "chore: update index.yaml for ${{ github.ref_name }}"
          git push origin gh-pages
